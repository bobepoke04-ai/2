---
- name: Backup Huawei firewall configuration to localhost safely
  hosts: bj
  gather_facts: false
  vars:
    backup_root: "/backup"
    backup_date: "{{ lookup('pipe', 'date +%Y%m%d') }}"
    backup_time: "{{ lookup('pipe', 'date +%H%M%S') }}"
    device_name: "{{ inventory_hostname }}"
    backup_dir: "{{ backup_root }}/{{ device_name }}/{{ backup_date }}"
    backup_file: "{{ backup_dir }}/{{ device_name }}_config_{{ backup_date }}_{{ backup_time }}.cfg"
    latest_file: "{{ backup_root }}/{{ device_name }}/latest.cfg"

  tasks:
    - name: Run display current-configuration on Huawei firewall
      ansible.netcommon.cli_command:
        command: display current-configuration
      register: config_output

    - name: Ensure config output exists
      fail:
        msg: "Device {{ inventory_hostname }} returned no configuration output"
      when: config_output.stdout is not defined

    - name: Convert config output to plain string
      set_fact:
        raw_config_text: "{{ (config_output.stdout | default('')) | string }}"

    - name: Fail if config text is blank
      fail:
        msg: "Device {{ inventory_hostname }} returned blank configuration text"
      when: raw_config_text | trim == ""

    - name: Normalize configuration text
      set_fact:
        normalized_config: >-
          {{
            raw_config_text
            | regex_replace('\r\n', '\n')
            | regex_replace('\r', '\n')
          }}

    - name: Remove unsafe control characters
      set_fact:
        sanitized_config: >-
          {{
            normalized_config
            | regex_replace('[\u0000-\u0008\u000B\u000C\u000E-\u001F]', '')
          }}

    - name: Ensure local backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Ensure local latest directory exists
      file:
        path: "{{ backup_root }}/{{ device_name }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Write sanitized config safely to local backup file
      shell: |
        python3 - <<'PY'
        import os

        dest = r'''{{ backup_file }}'''
        content = r'''{{ sanitized_config | replace("'''", "'\"'\"'") }}'''

        os.makedirs(os.path.dirname(dest), exist_ok=True)

        safe = content.encode('utf-8', errors='ignore').decode('utf-8', errors='ignore')

        with open(dest, 'w', encoding='utf-8', newline='\n') as f:
            f.write(safe)
        print(dest)
        PY
      args:
        executable: /bin/bash
      delegate_to: localhost
      register: write_result
      changed_when: true

    - name: Check backup file status
      stat:
        path: "{{ backup_file }}"
      delegate_to: localhost
      register: backup_file_stat

    - name: Fail if backup file was not created
      fail:
        msg: "Backup file was not created: {{ backup_file }}"
      when: not backup_file_stat.stat.exists

    - name: Fail if backup file is empty
      fail:
        msg: "Backup file is empty: {{ backup_file }}"
      when: backup_file_stat.stat.size | int == 0

    - name: Update latest backup file
      shell: |
        cp -f "{{ backup_file }}" "{{ latest_file }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: true

    - name: Show backup result
      debug:
        msg:
          - "Backup success for {{ inventory_hostname }}"
          - "Backup file: {{ backup_file }}"
          - "Latest file: {{ latest_file }}"
          - "Backup size: {{ backup_file_stat.stat.size }} bytes"
