---
- name: Collect Huawei firewall configs
  hosts: firewalld
  gather_facts: false

  tasks:
    - name: Set backup metadata
      set_fact:
        device_name: "{{ inventory_hostname }}"
        backup_date: "{{ lookup('pipe', 'date +%Y%m%d') }}"
        backup_time: "{{ lookup('pipe', 'date +%H%M%S') }}"

    - name: Run display current-configuration on Huawei firewall
      ansible.netcommon.cli_command:
        command: display current-configuration
      register: config_output
      vars:
        ansible_command_timeout: "{{ hostvars[inventory_hostname].ansible_command_timeout | default(180) }}"

    - name: Ensure config output exists
      fail:
        msg: "设备 {{ inventory_hostname }} 未返回配置输出"
      when:
        - config_output is not defined or config_output.stdout is not defined

    - name: Convert config output to plain string
      set_fact:
        raw_config_text: >-
          {{
            (
              config_output.stdout
              if config_output.stdout is string
              else (config_output.stdout | join('\n'))
            ) | string
          }}

    - name: Fail if config text is blank
      fail:
        msg: "设备 {{ inventory_hostname }} 返回的配置内容为空"
      when: raw_config_text | trim == ""

    - name: Normalize configuration text
      set_fact:
        normalized_config: >-
          {{
            raw_config_text
            | regex_replace('\r\n', '\n')
            | regex_replace('\r', '\n')
          }}

    - name: Remove unsafe control characters
      set_fact:
        sanitized_config: >-
          {{
            normalized_config
            | regex_replace('[\u0000-\u0008\u000B\u000C\u000E-\u001F]', '')
          }}

    - name: Mark backup collection success
      set_fact:
        backup_collect_success: true

    - name: Show stage 1 result
      debug:
        msg:
          - "阶段1完成：已从设备 {{ device_name }} 提取配置"
          - "备份日期: {{ backup_date }}"
          - "备份时间: {{ backup_time }}"
          - "内容长度: {{ sanitized_config | length }}"


- name: Write configs to host /data/backup and build report
  hosts: pp
  gather_facts: false

  vars:
    backup_root: "/data/backup"
    report_dir: "/data/backup/reports"
    firewall_hosts: "{{ groups['firewalld'] | default([]) }}"

  tasks:
    - name: Set stable report metadata
      set_fact:
        report_ts: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"
        report_file: "/data/backup/reports/firewall_backup_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}.md"
        latest_report_file: "/data/backup/reports/latest_firewall_backup_report.md"

    - name: Show firewall host list
      debug:
        var: firewall_hosts

    - name: Ensure report directory exists
      shell: |
        mkdir -p "{{ report_dir }}"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Ensure backup directories exist for all firewalls
      shell: |
        mkdir -p "{{ backup_root }}/{{ item }}"
      args:
        executable: /bin/bash
      loop: "{{ firewall_hosts }}"
      changed_when: true
      when: firewall_hosts | length > 0

    - name: Write backup files for all successful firewalls
      shell: |
        python3 - <<'PY'
        import os
        import base64

        device_name = r'''{{ hostvars[item].device_name | default(item) }}'''
        backup_date = r'''{{ hostvars[item].backup_date | default("") }}'''
        backup_time = r'''{{ hostvars[item].backup_time | default("") }}'''
        content_b64 = r'''{{ (hostvars[item].sanitized_config | default("")) | b64encode }}'''
        backup_root = r'''{{ backup_root }}'''

        if not backup_date or not backup_time or not content_b64:
            raise SystemExit(0)

        backup_dir = os.path.join(backup_root, device_name, backup_date)
        backup_file = os.path.join(
            backup_dir,
            f"{device_name}_config_{backup_date}_{backup_time}.cfg"
        )
        latest_file = os.path.join(backup_root, device_name, "latest.cfg")

        os.makedirs(backup_dir, exist_ok=True)

        raw = base64.b64decode(content_b64.encode("utf-8"))
        text = raw.decode("utf-8", errors="ignore")

        with open(backup_file, "w", encoding="utf-8", newline="\n") as f:
            f.write(text)

        with open(latest_file, "w", encoding="utf-8", newline="\n") as f:
            f.write(text)

        print(backup_file)
        print(latest_file)
        PY
      args:
        executable: /bin/bash
      loop: "{{ firewall_hosts }}"
      register: write_results
      changed_when: true
      when:
        - firewall_hosts | length > 0
        - hostvars[item].sanitized_config is defined

    - name: Initialize report file
      copy:
        dest: "{{ report_file }}"
        content: |
          # 防火墙配置备份报告

          - 生成时间: {{ lookup('pipe', 'date "+%Y-%m-%d %H:%M:%S"') }}
          - 备份根目录: {{ backup_root }}

          | 设备名称 | 管理IP | 备份状态 | 备份文件 | latest.cfg |
          |---|---|---|---|---|
      changed_when: true

    - name: Append report rows
      lineinfile:
        path: "{{ report_file }}"
        insertafter: EOF
        create: false
        line: >-
          | {{ hostvars[item].device_name | default(item) }}
          | {{ hostvars[item].ansible_host | default('-') }}
          | {{ '成功' if (hostvars[item].sanitized_config is defined) else '失败' }}
          | {{ (backup_root ~ '/' ~ (hostvars[item].device_name | default(item)) ~ '/' ~ (hostvars[item].backup_date | default('-')) ~ '/' ~ (hostvars[item].device_name | default(item)) ~ '_config_' ~ (hostvars[item].backup_date | default('-')) ~ '_' ~ (hostvars[item].backup_time | default('-')) ~ '.cfg') if (hostvars[item].sanitized_config is defined) else '-' }}
          | {{ (backup_root ~ '/' ~ (hostvars[item].device_name | default(item)) ~ '/latest.cfg') if (hostvars[item].sanitized_config is defined) else '-' }} |
      loop: "{{ firewall_hosts }}"
      when: firewall_hosts | length > 0

    - name: Update latest report file
      copy:
        src: "{{ report_file }}"
        dest: "{{ latest_report_file }}"
        remote_src: true
      changed_when: true

    - name: Show final result
      debug:
        msg:
          - "批量备份完成"
          - "备份目录: {{ backup_root }}"
          - "报告文件: {{ report_file }}"
          - "最新报告: {{ latest_report_file }}"
