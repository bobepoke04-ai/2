---
- name: Backup Huawei Firewall to hostPath
  hosts: bj
  gather_facts: false

  vars:
    today: "{{ lookup('pipe', 'date +%F') }}"
    timestamp: "{{ lookup('pipe', 'date +%F_%H%M%S') }}"
    keep_days: 30

    backup_root: "/backup"
    backup_dir: "{{ backup_root }}/{{ inventory_hostname }}/{{ today }}"
    backup_file: "{{ backup_dir }}/{{ inventory_hostname }}_{{ timestamp }}.cfg"

  tasks:
    - name: Show backup path
      debug:
        msg:
          - "backup_root={{ backup_root }}"
          - "backup_dir={{ backup_dir }}"
          - "backup_file={{ backup_file }}"
          - "ansible_host={{ ansible_host | default(inventory_hostname) }}"
          - "ansible_user={{ ansible_user | default('undefined') }}"
          - "ansible_port={{ ansible_port | default(22) }}"

    - name: Ensure backup dir exists on localhost
      shell: |
        mkdir -p "{{ backup_dir }}"
        chmod 775 "{{ backup_root }}" "{{ backup_root }}/{{ inventory_hostname }}" "{{ backup_dir }}" || true
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: false

    - name: Disable terminal paging
      ansible.netcommon.cli_command:
        command: screen-length 0 temporary
      ignore_errors: true

    - name: Get firewall configuration
      ansible.netcommon.cli_command:
        command: display current-configuration
      register: cfg

    - name: Fail if config output is empty
      fail:
        msg: "display current-configuration returned empty output, backup aborted."
      when:
        - cfg.stdout is not defined
        - false
      # 占位，真正判空见下一个任务

    - name: Fail if config output is empty (real check)
      fail:
        msg: "display current-configuration returned empty output, backup aborted."
      when: (cfg.stdout | default('') | string | trim | length) == 0

    - name: Sanitize config text for invalid unicode
      set_fact:
        cfg_text_clean: >-
          {{
            cfg.stdout
            | string
            | regex_replace('[\ud800-\udfff]', '')
          }}
      no_log: true

    - name: Write sanitized config to backup file on localhost
      copy:
        content: "{{ cfg_text_clean }}"
        dest: "{{ backup_file }}"
        mode: "0644"
      delegate_to: localhost
      no_log: true

    - name: Check backup file exists
      stat:
        path: "{{ backup_file }}"
      register: backup_stat
      delegate_to: localhost

    - name: Fail if backup file missing
      fail:
        msg: "Backup file was not created: {{ backup_file }}"
      when: not backup_stat.stat.exists

    - name: Fail if backup file is empty
      fail:
        msg: "Backup file is empty: {{ backup_file }}"
      when: (backup_stat.stat.size | int) == 0

    - name: Cleanup old backups
      shell: |
        find "{{ backup_root }}/{{ inventory_hostname }}" -type f -name "*.cfg" -mtime +{{ keep_days }} -delete
        find "{{ backup_root }}/{{ inventory_hostname }}" -type d -empty -delete
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: false
      failed_when: false

    - name: Show saved result
      debug:
        msg:
          - "Backup completed successfully."
          - "saved_file={{ backup_file }}"
          - "file_size={{ backup_stat.stat.size }} bytes"
