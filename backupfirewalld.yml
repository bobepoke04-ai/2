---
- name: Backup Huawei firewall configuration to /backup safely
  hosts: bj
  gather_facts: false

  vars:
    backup_root: "/backup"
    backup_date: "{{ lookup('pipe', 'date +%Y%m%d') }}"
    backup_time: "{{ lookup('pipe', 'date +%H%M%S') }}"
    device_name: "{{ inventory_hostname }}"
    backup_dir: "{{ backup_root }}/{{ device_name }}/{{ backup_date }}"
    backup_file: "{{ backup_dir }}/{{ device_name }}_config_{{ backup_date }}_{{ backup_time }}.cfg"
    latest_file: "{{ backup_root }}/{{ device_name }}/latest.cfg"

  tasks:
    - name: Debug localhost runtime identity
      shell: |
        echo "===== whoami ====="
        whoami || true
        echo "===== id ====="
        id || true
        echo "===== pwd ====="
        pwd || true
        echo "===== ls -ld /backup ====="
        ls -ld /backup || true
        echo "===== mount | grep backup ====="
        mount | grep backup || true
        echo "===== touch test ====="
        touch /backup/awx_job_write_test.txt || true
        echo "===== ls -l /backup ====="
        ls -l /backup || true
      args:
        executable: /bin/bash
      delegate_to: localhost
      register: localhost_debug
      changed_when: false
      ignore_errors: true

    - name: Show localhost debug result
      debug:
        var: localhost_debug.stdout_lines

    - name: Run display current-configuration on Huawei firewall
      ansible.netcommon.cli_command:
        command: display current-configuration
      register: config_output

    - name: Ensure config output exists
      fail:
        msg: "设备 {{ inventory_hostname }} 未返回配置输出"
      when:
        - config_output is not defined or config_output.stdout is not defined

    - name: Convert config output to plain string
      set_fact:
        raw_config_text: >-
          {{
            (
              config_output.stdout
              if config_output.stdout is string
              else (config_output.stdout | join('\n'))
            ) | string
          }}

    - name: Fail if config text is blank
      fail:
        msg: "设备 {{ inventory_hostname }} 返回的配置内容为空"
      when: raw_config_text | trim == ""

    - name: Normalize configuration text
      set_fact:
        normalized_config: >-
          {{
            raw_config_text
            | regex_replace('\r\n', '\n')
            | regex_replace('\r', '\n')
          }}

    - name: Remove unsafe control characters
      set_fact:
        sanitized_config: >-
          {{
            normalized_config
            | regex_replace('[\u0000-\u0008\u000B\u000C\u000E-\u001F]', '')
          }}

    - name: Ensure backup directories exist
      shell: |
        mkdir -p "{{ backup_root }}/{{ device_name }}"
        mkdir -p "{{ backup_dir }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: true

    - name: Write sanitized config safely to backup file
      shell: |
        python3 - <<'PY'
        import os

        dest = r'''{{ backup_file }}'''
        content = r'''{{ sanitized_config | replace("'''", "'\"'\"'") }}'''

        os.makedirs(os.path.dirname(dest), exist_ok=True)
        safe = content.encode('utf-8', errors='ignore').decode('utf-8', errors='ignore')

        with open(dest, 'w', encoding='utf-8', newline='\n') as f:
            f.write(safe)

        print(dest)
        PY
      args:
        executable: /bin/bash
      delegate_to: localhost
      register: write_result
      changed_when: true

    - name: Check backup file status
      stat:
        path: "{{ backup_file }}"
      delegate_to: localhost
      register: backup_file_stat

    - name: Fail if backup file was not created
      fail:
        msg: "备份文件未创建成功：{{ backup_file }}"
      when: not backup_file_stat.stat.exists

    - name: Fail if backup file is empty
      fail:
        msg: "备份文件为空：{{ backup_file }}"
      when: backup_file_stat.stat.size | int == 0

    - name: Update latest backup file
      shell: |
        cp -f "{{ backup_file }}" "{{ latest_file }}"
      args:
        executable: /bin/bash
      delegate_to: localhost
      changed_when: true

    - name: Show backup result
      debug:
        msg:
          - "设备: {{ inventory_hostname }}"
          - "备份成功"
          - "本次备份文件: {{ backup_file }}"
          - "最新备份文件: {{ latest_file }}"
          - "文件大小: {{ backup_file_stat.stat.size }} bytes"
