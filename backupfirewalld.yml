---
- name: Backup Huawei Firewall to hostPath
  hosts: bj
  gather_facts: false

  vars:
    today: "{{ lookup('pipe', 'date +%F') }}"
    timestamp: "{{ lookup('pipe', 'date +%F_%H%M%S') }}"
    keep_days: 30

    backup_root: "/backup"
    backup_dir: "{{ backup_root }}/{{ inventory_hostname }}/{{ today }}"
    backup_file: "{{ backup_dir }}/{{ inventory_hostname }}_{{ timestamp }}.cfg"

  tasks:
    - name: Show backup path
      debug:
        msg:
          - "backup_root={{ backup_root }}"
          - "backup_dir={{ backup_dir }}"
          - "backup_file={{ backup_file }}"

    - name: Disable terminal paging
      ansible.netcommon.cli_command:
        command: screen-length 0 temporary
      ignore_errors: true

    - name: Get firewall configuration
      community.network.ce_command:
        commands:
          - display current-configuration
      register: cfg

    - name: Fail if empty
      fail:
        msg: "No config returned"
      when: cfg.stdout is not defined or (cfg.stdout[0] | trim | length) == 0

    - name: Write config directly (final fix)
      shell: |
        mkdir -p "{{ backup_dir }}"
        printf "%s\n" "{{ cfg.stdout[0] | replace('"','\"') }}" > "{{ backup_file }}"
        chmod 644 "{{ backup_file }}"
      args:
        executable: /bin/bash
      delegate_to: localhost

    - name: Verify file
      shell: |
        ls -l "{{ backup_file }}"
      delegate_to: localhost

    - name: Cleanup old backups
      shell: |
        find "{{ backup_root }}/{{ inventory_hostname }}" -type f -mtime +{{ keep_days }} -delete
      delegate_to: localhost
      ignore_errors: true
